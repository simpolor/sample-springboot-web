<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student List</title>
    <style>
        table, tr, th, td {
            border: 1px solid #000;
            width: 500px;
        }

        #pagination {
            width: 500px;
        }

        #pagination ul {
            list-style: none;
            padding: 10px;
            text-align: center;
        }

        #pagination li {
            display: inline;
            padding: 0 5px;
        }

        #pagination a {
            text-decoration: none;
            color: #000000;
        }

        #pagination a:hover {
            color: #FF0000;
        }

        #pagination .active {
            font-weight: bold;
        }

        #pagination .disabled {
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Student List</h1>

    <div>
        <span th:text="'Totalcount : ' + ${pages.getTotalElements()}">0</span>
    </div>

    <table>
        <thead>
        <tr>
            <th>Seq</th>
            <th>Name</th>
            <th>Grade</th>
            <th>Age</th>
        </tr>
        </thead>
        <tbody>
            <tr th:each="student : ${pages.content}">
                <td th:text="${student.seq}"></td>
                <td><a th:text="${student.name}" th:href="@{/student/view/{seq}(seq=${student.seq})}"></a></td>
                <td th:text="${student.grade}"></td>
                <td th:text="${student.age}"></td>
            </tr>
        </tbody>
    </table>

    <br />
    <hr />

    <div id="pagination">
        <ul>
            <li th:class="${pages.number eq 0}?'disabled':''">
                <a th:unless="${pages.number eq 0}" th:href="@{__${#httpServletRequest.requestURI}__(page=1)}">first</a>
            </li>
            <li th:class="${pages.number eq 0}?'disabled':''">
                <a th:unless="${pages.number eq 0}" th:href="@{__${#httpServletRequest.requestURI}__(page=${(pages.number+1)-1})}">previous</a>
            </li>
            <li th:each="no:${#numbers.sequence(0, pages.totalPages-1)}" th:class="${pages.number eq no}?'active':''">
                <a th:href="@{__${#httpServletRequest.requestURI}__(page=${no+1})}" th:inline="text">[[${no+1}]]</a>
            </li>
            <li th:class="${pages.number+1 ge pages.totalPages}?'disabled':''">
                <a th:unless="${pages.number+1 ge pages.totalPages}" th:href="@{__${#httpServletRequest.requestURI}__(page=${(pages.number+1)+1})}">next</a>
            </li>
            <li th:class="${pages.number+1 ge pages.totalPages}?'disabled':''">
                <a th:unless="${pages.number+1 ge pages.totalPages}" th:href="@{__${#httpServletRequest.requestURI}__(page=${(pages.totalPages)})}">last</a>
            </li>
        </ul>
    </div><!-- pagination -->

    <br />
    <hr />
</body>
</html>
