<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Modify</title>
    <script>
        function f_modify() {
            document.getElementById("modifyForm").submit();
        }
    </script>
    <style>
        table, tr, th, td {
            border: 1px solid #000;
        }
    </style>
</head>
<body>
    <div th:include="header :: header"></div>

    <h1>Student Modify</h1>

    <form th:id="modifyForm" th:action="@{/student/modify}" th:method="post">
        <input th:type="hidden" th:name="seq" th:value="${student.seq}" />

        <div>
            <p>Name : <input th:name="name" th:value="${student.name}" /></p>
            <p>Grade : <input th:name="grade" th:value="${student.grade}" /></p>
            <p>Age : <input th:name="age" th:value="${student.age}" /></p>
            <p>Hobby : <input th:name="hobby" th:value="${student.hobby}" /></p>
        </div>

        <hr />
    </form>

    <button th:onclick="'f_modify('+${student.seq}+')'">수정</button>
    <button th:onclick="history.back()">뒤로</button>

    <div th:include="footer :: footer"></div>
</body>
</html>
